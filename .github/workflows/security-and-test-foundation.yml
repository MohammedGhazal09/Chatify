name: Security and Test Foundation

on:
  pull_request:
  push:
    branches:
      - main
      - "gsd/**"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend/Chatify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/Chatify/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Audit backend dependencies
        run: npm audit

      - name: Run backend tests
        run: npm test

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend/Chatify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/Chatify/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
